<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Menu | MH Food's</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<section class="hero" style="height: 50vh; min-height: 400px;">
  <div class="hero-bg-img" style="background-image:url('https://images.unsplash.com/photo-1414235077428-338988a2e8c0?auto=format&fit=crop&w=1920&q=80');"></div>
  <div class="hero-overlay"></div>
  <div class="hero-content anim-fade-up">
    <h1>Our Menu</h1>
    <div class="gold-divider"></div>
    <p class="hero-sub">Explore our wide range of fast food delicacies.</p>
  </div>
  <div class="wave-divider">
    <svg viewBox="0 0 1440 120" preserveAspectRatio="none"><path class="shape-fill" d="M0,64L80,69.3C160,75,320,85,480,80C640,75,800,53,960,48C1120,43,1280,53,1360,58.7L1440,64L1440,120L1360,120C1280,120,1120,120,960,120C800,120,640,120,480,120C320,120,160,120,80,120L0,120Z"></path></svg>
  </div>
</section>

<main class="section-padding" style="background: var(--bg-section);">
  <div class="container">
    <div class="menu-grid" id="full-menu-grid">
      <!-- Injected dynamically via menu-data.js -->
    </div>
  </div>
</main>

<script src="app.js"></script>
<script src="menu-data.js"></script>
</body>
</html>
